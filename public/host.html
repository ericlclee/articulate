<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Articulate! Host</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0e0d;--surf:#1c1a17;--surf2:#252220;--bdr:#3a3530;--txt:#f5f0e8;--muted:#9a9080;--acc:#e8a030;--red:#c0392b;--green:#27ae60}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh}
.nav{background:var(--surf);border-bottom:1px solid var(--bdr);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'Fraunces',serif;font-size:20px;font-weight:900;color:var(--acc)}
.tabs{display:flex;gap:3px}
.tab{background:none;border:1px solid transparent;padding:6px 14px;border-radius:8px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .12s}
.tab:hover{color:var(--txt)}
.tab.on{background:var(--acc);color:#000;font-weight:500}
.room-pill{background:var(--surf2);border:1px solid var(--bdr);border-radius:20px;padding:4px 14px;font-size:13px;font-weight:500;letter-spacing:2px;cursor:pointer;color:var(--txt)}
.pg{display:none;padding:18px;max-width:960px;margin:0 auto}
.pg.on{display:block}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:13px;padding:16px;margin-bottom:12px}
h3{font-family:'Fraunces',serif;font-size:16px;font-weight:700;margin-bottom:12px}
label{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.4px;display:block;margin-bottom:4px;text-transform:uppercase}
input,select,textarea{width:100%;background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);padding:8px 11px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:10px}
input:focus,select:focus,textarea:focus{border-color:var(--acc)}
select option{background:var(--surf)}
textarea{resize:vertical;min-height:70px}
.btn{padding:9px 18px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--bdr);background:none;color:var(--txt);transition:all .12s}
.btn:hover{background:var(--surf2)}
.btn-acc{background:var(--acc);color:#000;border-color:var(--acc)}
.btn-acc:hover{background:#f0b040}
.btn-ok{background:#1a3d2a;color:#52c97a;border-color:#2a5a3a}
.btn-ok:hover{background:#1f4a30}
.btn-bad{background:#3d1a1a;color:#e85d5d;border-color:#5a2a2a}
.btn-bad:hover{background:#4a2020}
.btn-warn{background:#3d2e00;color:#e8a030;border-color:#5a4500}
.btn-warn:hover{background:#4a3800}
.btn-sm{padding:6px 12px;font-size:12px}
.btn:disabled{opacity:.35;cursor:not-allowed}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.col2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sep{height:1px;background:var(--bdr);margin:12px 0}
.ci-list{display:flex;flex-direction:column;gap:5px;max-height:280px;overflow-y:auto}
.ci{background:var(--surf2);border-radius:8px;padding:8px 11px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.ci-w{font-weight:500;font-size:13px}
.ci-c{font-size:11px;color:var(--muted)}
.ci-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 5px;border-radius:4px}
.ci-del:hover{color:#e85d5d}
.empty{color:var(--muted);font-size:13px;text-align:center;padding:14px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;padding:9px 18px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.winner-box{background:#2a1f00;border:1px solid #6a4f00;border-radius:12px;padding:18px;text-align:center;margin-bottom:12px}
.winner-box h2{font-family:'Fraunces',serif;font-size:28px;color:var(--acc)}

/* Lobby */
.room-big{font-family:'Fraunces',serif;font-size:56px;font-weight:900;letter-spacing:10px;color:var(--acc);text-align:center;padding:10px 0}
.room-hint{font-size:13px;color:var(--muted);text-align:center;margin-bottom:16px}
.lobby-team{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr)}
.lobby-team:last-child{border-bottom:none}
.tdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lobby-empty{color:var(--muted);font-size:13px;font-style:italic;padding:14px 0}

/* Board */
.board-wrap{overflow-x:auto;padding:8px 0}
.board-row{display:flex;gap:3px;margin-bottom:3px}
.tile{width:52px;height:52px;border-radius:7px;border:1.5px solid var(--bdr);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;flex-shrink:0;cursor:default}
.tile-num{font-size:9px;color:var(--muted);position:absolute;top:3px;left:4px;font-weight:500}
.tile-tokens{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;max-width:44px;margin-top:4px}
.token{width:18px;height:18px;border-radius:50%;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;border:1.5px solid rgba(0,0,0,.3)}
.tile-start{background:var(--surf2) !important}
.tile-start .tile-num{font-size:8px}
.tile-win{border-color:#f5a623 !important}

/* Current turn panel */
.turn-panel{display:flex;gap:12px;align-items:stretch;flex-wrap:wrap;margin-bottom:12px}
.turn-panel .card{flex:1;min-width:200px;margin:0}
.cat-chip{font-size:12px;padding:3px 11px;border-radius:20px;font-weight:600;display:inline-block;margin-bottom:6px}

/* Team scores */
.score-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.score-row:last-child{border-bottom:none}
.score-row.active-team{background:rgba(232,160,48,.07);margin:0 -6px;padding:8px 6px;border-radius:7px;border-bottom:none}
.tscore{font-family:'Fraunces',serif;font-size:22px;color:var(--acc);min-width:36px;text-align:right}
.tpos{font-size:12px;color:var(--muted);min-width:80px;text-align:right}
.active-badge{font-size:11px;background:var(--acc);color:#000;padding:2px 8px;border-radius:20px;font-weight:500}

/* Legend */
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.leg-dot{width:10px;height:10px;border-radius:3px}

/* Timer ring (host view) */
.ring{position:relative;width:70px;height:70px}
.ring svg{transform:rotate(-90deg)}
circle{fill:none;stroke-width:6}
.tr{stroke:var(--bdr)}
.tp{stroke:var(--acc);stroke-linecap:round;transition:stroke-dashoffset .9s linear,stroke .3s}
.tnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:20px;font-weight:700}

@media(max-width:580px){.col2{grid-template-columns:1fr}.tile{width:40px;height:40px}.token{width:14px;height:14px;font-size:7px}}
</style>
</head>
<body>
<nav class="nav">
  <div class="logo">Articulate!</div>
  <div class="tabs">
    <button class="tab on" onclick="showPg('game')">Game</button>
    <button class="tab" onclick="showPg('cards')">Cards</button>
    <button class="tab" onclick="showPg('settings')">Settings</button>
  </div>
  <div class="room-pill" onclick="showPg('game')" id="room-badge">No room</div>
</nav>

<!-- GAME TAB -->
<div class="pg on" id="pg-game">

  <!-- LOBBY VIEW -->
  <div id="lobby-view">
    <div class="card" style="text-align:center">
      <h3>Room code</h3>
      <div class="room-big" id="room-display">----</div>
      <div class="room-hint">Teams go to <strong id="team-url"></strong> and enter this code to create their team</div>
      <div class="row" style="justify-content:center;gap:8px">
        <button class="btn btn-acc" onclick="createRoom()">New room</button>
        <button class="btn" onclick="copyCode()">Copy code</button>
      </div>
    </div>
    <div class="card">
      <h3>Teams joined <span id="team-count" style="font-size:13px;font-weight:400;color:var(--muted)">(0)</span></h3>
      <div id="lobby-teams"><div class="lobby-empty">Waiting for teams to join...</div></div>
      <div class="sep"></div>
      <div class="row">
        <button class="btn btn-acc" id="btn-start" onclick="startGame()" disabled>Start game</button>
        <span style="font-size:12px;color:var(--muted)">Need at least 2 teams</span>
      </div>
    </div>
  </div>

  <!-- ACTIVE GAME VIEW -->
  <div id="game-view" style="display:none">
    <div id="winner-area"></div>

    <!-- Turn info + timer + debug -->
    <div class="turn-panel">
      <div class="card" style="flex:2;min-width:260px">
        <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">Current turn</div>
        <div style="font-size:18px;font-weight:600;margin-bottom:6px" id="turn-team">—</div>
        <div id="turn-status" style="font-size:13px;color:var(--muted)">Waiting</div>
        <div style="margin-top:10px;display:flex;align-items:center;gap:10px">
          <div id="cur-cat" style="display:none"></div>
        </div>
      </div>
      <div class="card" style="display:flex;align-items:center;justify-content:center;padding:14px">
        <div>
          <div class="ring">
            <svg width="70" height="70" viewBox="0 0 70 70">
              <circle class="tr" cx="35" cy="35" r="29"/>
              <circle class="tp" id="tp" cx="35" cy="35" r="29" stroke-dasharray="182.2" stroke-dashoffset="0"/>
            </svg>
            <div class="tnum" id="tnum">—</div>
          </div>
          <div style="font-size:10px;color:var(--muted);text-align:center;margin-top:4px" id="tlbl">Ready</div>
        </div>
      </div>
      <div class="card" style="min-width:160px">
        <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px">Debug</div>
        <div style="display:flex;flex-direction:column;gap:7px">
          <button class="btn btn-warn btn-sm" onclick="api('skip-turn')">Skip turn →</button>
          <button class="btn btn-sm" id="btn-undo" onclick="undoTurn()">← Undo turn</button>
          <button class="btn btn-bad btn-sm" onclick="if(confirm('Reset all scores?'))api('reset')">Reset scores</button>
        </div>
      </div>
    </div>

    <!-- Board -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">
        <h3 style="margin:0">Board</h3>
        <div class="legend" id="cat-legend"></div>
      </div>
      <div class="board-wrap">
        <div id="board"></div>
      </div>
    </div>

    <!-- Scoreboard -->
    <div class="card">
      <h3>Scores</h3>
      <div id="scores-list"></div>
    </div>
  </div>
</div>

<!-- CARDS TAB -->
<div class="pg" id="pg-cards">
  <div class="col2">
    <div class="card">
      <h3>Add card</h3>
      <label>Word / phrase</label>
      <input id="cw" placeholder="e.g. Mount Everest" onkeydown="if(event.key==='Enter')addCard()"/>
      <label>Category</label>
      <select id="cc"><option>Object</option><option>Action</option><option>World</option><option>Person</option><option>Nature</option><option>Random</option></select>
      <label>Hint (optional)</label>
      <input id="ch" placeholder="e.g. Highest mountain"/>
      <button class="btn btn-acc" style="width:100%;margin-top:2px" onclick="addCard()">Add card</button>
      <div class="sep"></div>
      <label>Bulk import (word,category,hint — one per line)</label>
      <textarea id="bulk" placeholder="Big Ben,World&#10;Swimming,Action&#10;Einstein,Person,German physicist"></textarea>
      <button class="btn" style="width:100%" onclick="bulkImport()">Import</button>
    </div>
    <div class="card">
      <h3 id="card-ct-title">Cards (0)</h3>
      <div class="ci-list" id="ci-list"><div class="empty">No cards yet</div></div>
      <div class="sep"></div>
      <div class="row">
        <button class="btn btn-sm" onclick="exportCards()">Export JSON</button>
        <button class="btn btn-sm" onclick="document.getElementById('imp-f').click()">Import JSON</button>
        <input type="file" id="imp-f" accept=".json" style="display:none;width:auto;margin:0" onchange="importCards(event)"/>
        <button class="btn btn-sm" style="color:#e85d5d" onclick="clearCards()">Clear all</button>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS TAB -->
<div class="pg" id="pg-settings">
  <div class="card" style="max-width:480px">
    <h3>Game settings</h3>
    <div class="col2">
      <div><label>Timer (seconds)</label><input type="number" id="s-timer" value="60" min="10" max="300"/></div>
      <div><label>Spaces to win</label><input type="number" id="s-spaces" value="30" min="5" max="60"/></div>
    </div>
    <button class="btn btn-acc" onclick="saveSettings()">Save settings</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CIRC = 182.2;
const TCOLORS = ['#4a9eff','#e85d8a','#52c97a','#f5a623','#ff7f50','#b39ddb'];
const CATS = ['Object','Action','World','Person','Nature','Random'];
const CAT_COL = {Object:'#4a9eff',Action:'#e85d8a',World:'#52c97a',Person:'#f5a623',Nature:'#3cd08a',Random:'#c57aff'};

let state = null;
let localCards = [];
let timerI = null;
let timerLeft = 0;
let timerMax = 60;
let undoAvail = false;

async function api(endpoint, body) {
  try {
    const res = await fetch('/api/' + endpoint, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined
    });
    return res.json();
  } catch { toast('Connection error'); }
}

function showPg(p) {
  document.querySelectorAll('.pg,.tab').forEach(e => e.classList.remove('on'));
  document.getElementById('pg-' + p).classList.add('on');
  document.querySelectorAll('.tab').forEach(t => {
    if ((p === 'game' && t.textContent === 'Game') ||
        (p === 'cards' && t.textContent === 'Cards') ||
        (p === 'settings' && t.textContent === 'Settings')) t.classList.add('on');
  });
  if (p === 'cards') renderCards();
}

function applyState(s) {
  state = s;
  document.getElementById('room-badge').textContent = s.room || 'No room';
  document.getElementById('room-display').textContent = s.room || '----';
  document.getElementById('team-url').textContent = location.origin + '/team';

  const isLobby = s.phase === 'lobby';
  document.getElementById('lobby-view').style.display = isLobby ? '' : 'none';
  document.getElementById('game-view').style.display = isLobby ? 'none' : '';

  if (isLobby) renderLobby(s);
  else renderGame(s);
}

function renderLobby(s) {
  const teams = s.teams || [];
  document.getElementById('team-count').textContent = `(${teams.length})`;
  const btn = document.getElementById('btn-start');
  btn.disabled = teams.length < 2;

  if (!teams.length) {
    document.getElementById('lobby-teams').innerHTML = '<div class="lobby-empty">Waiting for teams to join...</div>';
    return;
  }
  document.getElementById('lobby-teams').innerHTML = teams.map((t, i) => `
    <div class="lobby-team">
      <div class="tdot" style="background:${TCOLORS[i % 6]}"></div>
      <div style="flex:1;font-weight:500">${t.name}</div>
      <div style="font-size:12px;color:${t.connected ? '#52c97a' : 'var(--muted)'}">
        ${t.connected ? 'Connected' : 'Not connected'}
      </div>
    </div>
  `).join('');
}

function renderGame(s) {
  const { teams, settings, gs, currentCard, phase } = s;

  // Winner
  const wa = document.getElementById('winner-area');
  if (phase === 'done') {
    const w = teams.find(t => t.pos >= parseInt(settings.spaces));
    wa.innerHTML = w
      ? `<div class="winner-box"><h2>${w.name} wins!</h2><p style="color:var(--muted);font-size:13px;margin-top:6px">First to ${settings.spaces} spaces!</p><button class="btn btn-sm btn-acc" style="margin-top:10px" onclick="api('reset')">Play again</button></div>`
      : '';
  } else wa.innerHTML = '';

  // Turn panel
  const activeTeam = teams[gs.turn];
  document.getElementById('turn-team').textContent = activeTeam ? activeTeam.name : '—';

  const catPos = activeTeam ? activeTeam.pos : 0;
  const cat = CATS[catPos % CATS.length];
  const catEl = document.getElementById('cur-cat');
  catEl.style.display = '';
  catEl.innerHTML = `<span class="cat-chip" style="background:${CAT_COL[cat]}22;color:${CAT_COL[cat]}">${cat}</span>`;

  if (gs.phase === 'playing') {
    document.getElementById('turn-status').textContent = currentCard
      ? `Describing: "${currentCard.word}"`
      : 'Card active';
  } else {
    document.getElementById('turn-status').textContent = 'Waiting for team to get a card';
  }

  // Timer
  timerMax = parseInt(settings.timer);
  if (gs.phase === 'playing' && s.timestamp) {
    const elapsed = Math.floor((Date.now() - s.timestamp) / 1000);
    timerLeft = Math.max(0, timerMax - elapsed);
    startTimer();
  } else {
    stopTimer();
    document.getElementById('tnum').textContent = timerMax;
    document.getElementById('tlbl').textContent = 'Ready';
    setTP(1);
  }

  // Board
  renderBoard(s);

  // Scores
  document.getElementById('scores-list').innerHTML = teams.map((t, i) => `
    <div class="score-row ${i === gs.turn ? 'active-team' : ''}">
      <div class="tdot" style="background:${TCOLORS[i % 6]}"></div>
      <div style="flex:1;font-weight:500;font-size:14px">${t.name}</div>
      <div class="tpos">${t.pos} / ${settings.spaces}</div>
      <div class="tscore">${t.score}</div>
      ${i === gs.turn ? '<div class="active-badge">Playing</div>' : ''}
    </div>
  `).join('');
}

function renderBoard(s) {
  const { teams, settings, gs } = s;
  const spaces = parseInt(settings.spaces);

  // Build tile list: 0 = start, 1..spaces
  const tiles = [];
  for (let i = 0; i <= spaces; i++) {
    const cat = i === 0 ? null : CATS[(i - 1) % CATS.length];
    tiles.push({ pos: i, cat });
  }

  // Snake rows of 10
  const ROW = 10;
  const rows = [];
  for (let r = 0; r * ROW < tiles.length; r++) {
    const slice = tiles.slice(r * ROW, r * ROW + ROW);
    rows.push(r % 2 === 1 ? [...slice].reverse() : slice);
  }

  // Legend
  document.getElementById('cat-legend').innerHTML = CATS.map(c =>
    `<div class="leg-item"><div class="leg-dot" style="background:${CAT_COL[c]}"></div>${c}</div>`
  ).join('');

  // Render
  document.getElementById('board').innerHTML = rows.map(row =>
    `<div class="board-row">${row.map(tile => {
      const teamsHere = teams.map((t, i) => ({ ...t, i })).filter(t => t.pos === tile.pos);
      const col = tile.cat ? CAT_COL[tile.cat] : null;
      const isActive = teamsHere.some(t => t.i === gs.turn);
      const isWin = tile.pos === spaces;
      const bg = tile.pos === 0 ? 'var(--surf2)' : `${col}20`;
      const border = isActive ? col : (isWin ? '#f5a623' : 'var(--bdr)');
      const tokens = teamsHere.map(t =>
        `<div class="token" style="background:${TCOLORS[t.i % 6]}" title="${t.name}">${t.name[0].toUpperCase()}</div>`
      ).join('');
      return `<div class="tile${tile.pos === 0 ? ' tile-start' : ''}${isWin ? ' tile-win' : ''}" style="background:${bg};border-color:${border}">
        <div class="tile-num">${tile.pos === 0 ? 'S' : tile.pos}</div>
        <div class="tile-tokens">${tokens}</div>
      </div>`;
    }).join('')}</div>`
  ).join('');
}

function startTimer() {
  stopTimer();
  renderTimer();
  timerI = setInterval(() => {
    timerLeft = Math.max(0, timerLeft - 1);
    renderTimer();
    if (timerLeft <= 0) stopTimer();
  }, 1000);
}

function stopTimer() { clearInterval(timerI); timerI = null; }

function renderTimer() {
  document.getElementById('tnum').textContent = timerLeft;
  setTP(timerLeft / timerMax);
  document.getElementById('tp').style.stroke = timerLeft <= 10 ? '#e85d8a' : 'var(--acc)';
  document.getElementById('tlbl').textContent = timerLeft > 0 ? 'Counting down' : "Time's up!";
}

function setTP(f) {
  document.getElementById('tp').style.strokeDashoffset = CIRC * (1 - f);
}

async function createRoom() {
  const r = await api('create-room');
  if (r && r.room) toast('Room created! Share the code.');
}

function copyCode() {
  const code = document.getElementById('room-display').textContent;
  if (code === '----') { toast('Create a room first!'); return; }
  navigator.clipboard.writeText(code).then(() => toast('Code copied!')).catch(() => toast(code));
}

async function startGame() {
  const r = await api('start-game');
  if (r && r.ok) toast('Game started!');
  else if (r && r.error) toast(r.error);
}

async function undoTurn() {
  const r = await api('undo-turn');
  if (r && r.error) toast(r.error);
  else toast('Turn undone');
}

async function saveSettings() {
  const timer = parseInt(document.getElementById('s-timer').value) || 60;
  const spaces = parseInt(document.getElementById('s-spaces').value) || 30;
  await api('settings', { timer, spaces });
  toast('Settings saved');
}

// Cards
async function addCard() {
  const w = document.getElementById('cw').value.trim();
  if (!w) { toast('Enter a word!'); return; }
  const card = { word: w, cat: document.getElementById('cc').value, hint: document.getElementById('ch').value.trim() };
  await fetch('/api/cards', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(card) });
  document.getElementById('cw').value = '';
  document.getElementById('ch').value = '';
  await loadCards();
  toast('Card added!');
}

async function bulkImport() {
  const lines = document.getElementById('bulk').value.trim().split('\n');
  const newCards = [];
  lines.forEach(l => {
    const p = l.split(',');
    if (p[0]) newCards.push({ word: p[0].trim(), cat: p[1] ? p[1].trim() : 'Object', hint: p[2] ? p[2].trim() : '' });
  });
  if (!newCards.length) { toast('Nothing to import'); return; }
  await fetch('/api/cards', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify([...localCards, ...newCards]) });
  document.getElementById('bulk').value = '';
  await loadCards();
  toast(`Imported ${newCards.length} cards!`);
}

async function deleteCard(i) {
  localCards.splice(i, 1);
  await fetch('/api/cards', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(localCards) });
  renderCards();
}

async function clearCards() {
  if (!confirm('Clear all cards?')) return;
  await api('cards/clear');
  await loadCards();
  toast('Cleared!');
}

function exportCards() {
  const b = new Blob([JSON.stringify(localCards, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'articulate-cards.json'; a.click();
}

async function importCards(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = async ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (Array.isArray(d)) {
        await fetch('/api/cards', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify([...localCards, ...d]) });
        await loadCards();
        toast(`Imported ${d.length} cards!`);
      }
    } catch { toast('Invalid file'); }
  };
  r.readAsText(f);
}

async function loadCards() {
  const r = await fetch('/api/cards');
  localCards = await r.json();
  renderCards();
}

function renderCards() {
  document.getElementById('card-ct-title').textContent = `Cards (${localCards.length})`;
  const el = document.getElementById('ci-list');
  if (!localCards.length) { el.innerHTML = '<div class="empty">No cards yet</div>'; return; }
  el.innerHTML = localCards.map((c, i) => `
    <div class="ci">
      <div><div class="ci-w">${c.word}</div><div class="ci-c" style="color:${CAT_COL[c.cat] || '#999'}">${c.cat}${c.hint ? ' · ' + c.hint : ''}</div></div>
      <button class="ci-del" onclick="deleteCard(${i})">✕</button>
    </div>
  `).join('');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function connectSSE() {
  const es = new EventSource('/events');
  es.onmessage = e => {
    try { const d = JSON.parse(e.data); if (d.type === 'state') applyState(d.payload); } catch {}
  };
  es.onerror = () => setTimeout(connectSSE, 3000);
}

// Sync settings inputs when state arrives
function syncSettingsInputs(s) {
  if (s && s.settings) {
    document.getElementById('s-timer').value = s.settings.timer;
    document.getElementById('s-spaces').value = s.settings.spaces;
  }
}

const origApply = applyState;
window.applyState = function(s) { origApply(s); syncSettingsInputs(s); };

connectSSE();
loadCards();
fetch('/api/state').then(r => r.json()).then(applyState);
</script>
</body>
</html>
