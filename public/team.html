<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Articulate! Team</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0e0d;--surf:#1c1a17;--surf2:#252220;--bdr:#3a3530;--txt:#f5f0e8;--muted:#9a9080;--acc:#e8a030;--green:#27ae60}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh}
.screen{display:none;padding:20px;max-width:460px;margin:0 auto}
.screen.on{display:block}
.logo{font-family:'Fraunces',serif;font-size:24px;font-weight:900;color:var(--acc);text-align:center;margin-bottom:6px;margin-top:32px}
.sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:18px;margin-bottom:12px}
label{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.4px;display:block;margin-bottom:5px;text-transform:uppercase}
input,select{width:100%;background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;color:var(--txt);padding:10px 13px;font-family:'DM Sans',sans-serif;font-size:16px;outline:none;margin-bottom:14px}
input:focus,select:focus{border-color:var(--acc)}
select option{background:var(--surf)}
.btn{width:100%;padding:13px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;border:1px solid var(--bdr);background:none;color:var(--txt);transition:all .12s;margin-bottom:8px}
.btn:hover{background:var(--surf2)}
.btn-acc{background:var(--acc);color:#000;border-color:var(--acc)}
.btn-acc:hover{background:#f0b040}
.btn-ok{background:#1a3d2a;color:#52c97a;border-color:#2a5a3a;font-size:18px;padding:16px}
.btn-ok:hover{background:#1f4a30}
.btn-end{background:#252220;color:var(--muted);border-color:var(--bdr)}
.btn-end:hover{background:#2e2b27}
.btn:disabled{opacity:.35;cursor:not-allowed}
.code-big{font-size:32px;font-family:'Fraunces',serif;font-weight:700;letter-spacing:8px;text-align:center;text-transform:uppercase}
.spin-wrap{text-align:center;padding:28px 0}
.spin{width:34px;height:34px;border:2.5px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-txt{font-size:14px;color:var(--muted)}

/* Lobby waiting */
.lobby-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bdr);font-size:14px}
.lobby-item:last-child{border-bottom:none}
.tdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.me-badge{font-size:11px;background:var(--acc);color:#000;padding:1px 7px;border-radius:20px;font-weight:500}

/* Game */
.turn-banner{border-radius:10px;padding:13px 15px;text-align:center;font-size:15px;font-weight:600;margin-bottom:12px}
.your-turn{background:#1a3d2a;color:#52c97a}
.their-turn{background:var(--surf2);color:var(--muted)}
.timer-ring{position:relative;width:120px;height:120px;margin:0 auto 6px}
.timer-ring svg{transform:rotate(-90deg)}
circle{fill:none;stroke-width:7}
.tr{stroke:var(--bdr)}
.tp{stroke:var(--acc);stroke-linecap:round;transition:stroke-dashoffset .9s linear,stroke .3s}
.tnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:36px;font-weight:700}
.tlbl{font-size:12px;color:var(--muted);text-align:center;margin-bottom:14px}

.card-reveal{border:1px solid var(--bdr);border-radius:12px;padding:26px;text-align:center;min-height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:10px 0}
.big-word{font-family:'Fraunces',serif;font-size:48px;font-weight:900;line-height:1.1}
.cat-chip{font-size:12px;padding:3px 11px;border-radius:20px;font-weight:600;margin-bottom:10px;display:inline-block}
.hint-txt{font-size:13px;color:var(--muted);margin-top:8px}
.hidden-card{color:var(--muted);font-size:14px}

.scores-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.score-box{background:var(--surf2);border-radius:10px;padding:11px 13px}
.score-box.me{border:1.5px solid var(--acc)}
.sname{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.spos{font-size:11px;color:var(--muted);margin-top:2px}
.sscr{font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:var(--acc);margin-top:2px}
.prog{height:4px;background:var(--bdr);border-radius:2px;margin-top:6px;overflow:hidden}
.prog-f{height:100%;background:var(--acc);border-radius:2px;transition:width .4s}
.playing-dot{width:7px;height:7px;border-radius:50%;background:#52c97a;display:inline-block;margin-right:5px;vertical-align:middle}
.winner-box{background:#2a1f00;border:1px solid #6a4f00;border-radius:12px;padding:18px;text-align:center;margin-bottom:12px}
.winner-box h2{font-family:'Fraunces',serif;font-size:26px;color:var(--acc)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;padding:9px 18px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.conn-dot{width:8px;height:8px;border-radius:50%;background:#888;display:inline-block;margin-right:5px;vertical-align:middle;transition:background .3s}
.conn-dot.ok{background:#52c97a}
.error-msg{color:#e85d5d;font-size:13px;text-align:center;margin-top:-4px;margin-bottom:8px;min-height:18px}
</style>
</head>
<body>

<!-- JOIN SCREEN -->
<div class="screen on" id="s-join">
  <div class="logo">Articulate!</div>
  <div class="sub">Team device</div>
  <div class="card">
    <label>Room code</label>
    <input class="code-big" id="room-in" maxlength="4" placeholder="ABCD" autocomplete="off"
      oninput="this.value=this.value.toUpperCase(); onCodeInput()"/>
    <label>Team name</label>
    <input id="team-name-in" placeholder="e.g. The Champions" style="margin-bottom:6px"
      oninput="joinHint.textContent=''" onkeydown="if(event.key==='Enter')joinGame()"/>
    <div class="error-msg" id="join-hint"></div>
    <button class="btn btn-acc" onclick="joinGame()" id="btn-join">Join</button>
  </div>
  <div id="rejoin-note" style="display:none;text-align:center;font-size:12px;color:var(--muted);margin-top:-4px">
    Game in progress — enter your exact team name to rejoin
  </div>
</div>

<!-- LOBBY WAITING SCREEN -->
<div class="screen" id="s-lobby">
  <div class="logo">Articulate!</div>
  <div class="sub" id="lobby-sub">Waiting for host to start...</div>
  <div class="card">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px" id="lobby-myteam"></div>
    <div id="lobby-list"></div>
  </div>
  <button class="btn" onclick="leaveGame()">Leave</button>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="s-game">
  <div id="winner-area"></div>
  <div id="turn-banner" class="turn-banner their-turn">Waiting...</div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div>
        <div style="font-weight:600;font-size:15px" id="g-myteam">Your team</div>
        <div style="font-size:12px;color:var(--muted)">
          <span class="conn-dot" id="conn-dot"></span><span id="conn-lbl">Connecting...</span>
        </div>
      </div>
      <button class="btn" style="width:auto;padding:6px 12px;font-size:12px;margin:0" onclick="leaveGame()">Leave</button>
    </div>

    <div class="timer-ring">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle class="tr" cx="60" cy="60" r="52"/>
        <circle class="tp" id="tp" cx="60" cy="60" r="52" stroke-dasharray="326.7" stroke-dashoffset="0"/>
      </svg>
      <div class="tnum" id="tnum">—</div>
    </div>
    <div class="tlbl" id="tlbl">Waiting</div>

    <div id="card-reveal" class="card-reveal">
      <div class="hidden-card">Waiting for your turn...</div>
    </div>

    <!-- Controls shown only on your turn -->
    <div id="turn-controls" style="margin-top:10px;display:none">
      <button class="btn btn-acc" id="btn-get-card" onclick="getCard()" style="font-size:17px;padding:15px">
        Get card
      </button>
      <div id="answer-controls" style="display:none">
        <div id="turn-score-display" style="text-align:center;margin-bottom:10px;font-size:13px;color:var(--muted)">This turn: <strong id="turn-score-val" style="color:var(--acc);font-family:'Fraunces',serif;font-size:18px">0</strong></div>
        <button class="btn btn-ok" onclick="markCorrect()">Correct</button>
        <button class="btn btn-end" onclick="endTurn()">End turn</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div style="font-size:11px;font-weight:500;color:var(--muted);margin-bottom:10px;letter-spacing:.5px;text-transform:uppercase">Scoreboard</div>
    <div class="scores-grid" id="scores-grid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CIRC = 326.7;
const TCOLORS = ['#4a9eff','#e85d8a','#52c97a','#f5a623','#ff7f50','#b39ddb'];
const CATCOL = {Object:'#4a9eff',Action:'#ff6b6b',World:'#52c97a',Person:'#f5a623',Nature:'#26c6da',Random:'#c57aff'};

let myTeamIdx = -1;
let myRoom = '';
let lastState = null;
let es = null;
let timerI = null;
let timerLeft = 0;
let timerMax = 60;

const joinHint = document.getElementById('join-hint');

function showScreen(s) {
  document.querySelectorAll('.screen').forEach(e => e.classList.remove('on'));
  document.getElementById('s-' + s).classList.add('on');
}

async function onCodeInput() {
  const code = document.getElementById('room-in').value.trim().toUpperCase();
  joinHint.textContent = '';
  if (code.length !== 4) { document.getElementById('rejoin-note').style.display = 'none'; return; }
  try {
    const r = await fetch('/api/state');
    const s = await r.json();
    if (s && s.room === code && s.phase !== 'lobby') {
      document.getElementById('rejoin-note').style.display = '';
      document.getElementById('team-name-in').placeholder = 'Enter your exact team name';
    } else {
      document.getElementById('rejoin-note').style.display = 'none';
      document.getElementById('team-name-in').placeholder = 'e.g. The Champions';
    }
  } catch {}
}

async function joinGame() {
  const code = document.getElementById('room-in').value.trim().toUpperCase();
  const name = document.getElementById('team-name-in').value.trim();
  joinHint.textContent = '';

  if (code.length !== 4) { joinHint.textContent = 'Enter a 4-letter room code'; return; }
  if (!name) { joinHint.textContent = 'Enter your team name'; return; }

  try {
    const stateRes = await fetch('/api/state');
    const stateData = await stateRes.json();
    if (!stateData || !stateData.room) { joinHint.textContent = 'Room not found'; return; }
    if (stateData.room !== code) { joinHint.textContent = 'Wrong room code'; return; }
  } catch { joinHint.textContent = 'Cannot reach server'; return; }

  const res = await fetch('/api/join-team', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name })
  });
  const data = await res.json();

  if (data.error) { joinHint.textContent = data.error; return; }

  myRoom = code;
  myTeamIdx = data.teamIdx;

  // Check current phase to go to right screen
  const stateRes2 = await fetch('/api/state');
  const s = await stateRes2.json();

  connectSSE();

  if (s.phase === 'lobby') {
    document.getElementById('lobby-myteam').textContent = `You are: ${data.teamName}`;
    showScreen('lobby');
    renderLobby(s);
  } else {
    document.getElementById('g-myteam').textContent = data.teamName;
    showScreen('game');
    if (lastState) renderGame(lastState);
  }
}

function leaveGame() {
  if (es) { es.close(); es = null; }
  stopTimer();
  myRoom = ''; myTeamIdx = -1; lastState = null;
  document.getElementById('room-in').value = '';
  document.getElementById('team-name-in').value = '';
  joinHint.textContent = '';
  document.getElementById('rejoin-note').style.display = 'none';
  showScreen('join');
}

function connectSSE() {
  if (es) es.close();
  es = new EventSource('/events');
  es.onopen = () => setConn(true);
  es.onmessage = e => {
    setConn(true);
    try { const d = JSON.parse(e.data); if (d.type === 'state') applyState(d.payload); } catch {}
  };
  es.onerror = () => { setConn(false); setTimeout(connectSSE, 3000); };
}

function setConn(ok) {
  const dot = document.getElementById('conn-dot');
  const lbl = document.getElementById('conn-lbl');
  if (!dot) return;
  dot.className = 'conn-dot' + (ok ? ' ok' : '');
  lbl.textContent = ok ? 'Connected' : 'Reconnecting...';
}

function applyState(s) {
  lastState = s;

  // If we're in the lobby screen, update lobby list
  if (document.getElementById('s-lobby').classList.contains('on')) {
    renderLobby(s);
    // Host started the game — move to game screen
    if (s.phase === 'active' || s.phase === 'done') {
      if (myTeamIdx >= 0 && s.teams[myTeamIdx]) {
        document.getElementById('g-myteam').textContent = s.teams[myTeamIdx].name;
      }
      showScreen('game');
      renderGame(s);
    }
    return;
  }

  // If we're on the join screen, don't auto-navigate
  if (document.getElementById('s-join').classList.contains('on')) return;

  renderGame(s);
}

function renderLobby(s) {
  const teams = s.teams || [];
  document.getElementById('lobby-sub').textContent =
    s.phase === 'lobby' ? 'Waiting for host to start...' : 'Game in progress';
  document.getElementById('lobby-list').innerHTML = teams.length
    ? teams.map((t, i) => `
        <div class="lobby-item">
          <div class="tdot" style="background:${TCOLORS[i % 6]}"></div>
          <span style="flex:1">${t.name}</span>
          ${i === myTeamIdx ? '<span class="me-badge">You</span>' : ''}
        </div>
      `).join('')
    : '<div style="color:var(--muted);font-size:13px;text-align:center;padding:10px">No teams yet</div>';
}

function renderGame(s) {
  if (!s) return;
  const { teams, settings, gs, currentCard, phase } = s;
  const isMyTurn = gs.turn === myTeamIdx;
  timerMax = parseInt(settings.timer);

  // Winner
  document.getElementById('winner-area').innerHTML = phase === 'done'
    ? `<div class="winner-box"><h2>${teams.find(t => t.pos >= parseInt(settings.spaces))?.name || '?'} wins!</h2></div>`
    : '';

  // Turn banner
  const banner = document.getElementById('turn-banner');
  if (isMyTurn) {
    banner.className = 'turn-banner your-turn';
    banner.textContent = gs.phase === 'playing' ? 'Your turn — describe it!' : 'Your turn!';
  } else {
    const active = teams[gs.turn];
    banner.className = 'turn-banner their-turn';
    banner.innerHTML = `<span class="playing-dot"></span>${active ? active.name : '?'} is describing...`;
  }

  // Turn controls
  const controls = document.getElementById('turn-controls');
  const btnGet = document.getElementById('btn-get-card');
  const answerControls = document.getElementById('answer-controls');

  if (isMyTurn && phase === 'active') {
    controls.style.display = '';
    if (gs.phase === 'waiting') {
      btnGet.style.display = '';
      answerControls.style.display = 'none';
    } else {
      btnGet.style.display = 'none';
      answerControls.style.display = '';
      document.getElementById('turn-score-val').textContent = gs.turnScore || 0;
    }
  } else {
    controls.style.display = 'none';
  }

  // Card display
  const cr = document.getElementById('card-reveal');
  if (isMyTurn && currentCard) {
    const col = CATCOL[currentCard.cat] || '#999';
    cr.innerHTML = `
      <div class="cat-chip" style="background:${col}22;color:${col}">${currentCard.cat}</div>
      <div class="big-word">${currentCard.word}</div>
      ${currentCard.hint ? `<div class="hint-txt">${currentCard.hint}</div>` : ''}
    `;
  } else if (isMyTurn && gs.phase === 'waiting') {
    cr.innerHTML = '<div class="hidden-card">Press "Get card" to start your turn</div>';
  } else {
    cr.innerHTML = '<div class="hidden-card">Card hidden — only the describer sees it</div>';
  }

  // Timer
  if (gs.phase === 'playing' && s.timestamp) {
    const elapsed = Math.floor((Date.now() - s.timestamp) / 1000);
    timerLeft = Math.max(0, timerMax - elapsed);
    startTimer();
  } else {
    stopTimer();
    document.getElementById('tnum').textContent = timerMax;
    setTP(1);
    document.getElementById('tlbl').textContent = isMyTurn && gs.phase === 'waiting' ? 'Ready' : 'Waiting';
  }

  // Scores
  document.getElementById('g-myteam').textContent = teams[myTeamIdx] ? teams[myTeamIdx].name : 'Your team';
  document.getElementById('scores-grid').innerHTML = teams.map((t, i) => {
    const pct = Math.round(Math.min(100, (t.pos / parseInt(settings.spaces)) * 100));
    return `<div class="score-box ${i === myTeamIdx ? 'me' : ''}">
      <div class="sname">${i === gs.turn ? '<span class="playing-dot"></span>' : ''}${t.name}</div>
      <div class="sscr">${t.pos}<span style="font-size:13px;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400"> / ${settings.spaces}</span></div>
      <div class="prog"><div class="prog-f" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

async function getCard() {
  const r = await fetch('/api/new-card', { method: 'POST' });
  const d = await r.json();
  if (d.error) toast(d.error);
}

async function markCorrect() {
  await fetch('/api/correct', { method: 'POST' });
}

async function endTurn() {
  await fetch('/api/end-turn', { method: 'POST' });
}

function startTimer() {
  stopTimer();
  renderTimerDisplay();
  timerI = setInterval(() => {
    timerLeft = Math.max(0, timerLeft - 1);
    renderTimerDisplay();
    if (timerLeft <= 0) { stopTimer(); autoEndTurn(); }
  }, 1000);
}

function stopTimer() { clearInterval(timerI); timerI = null; }

function renderTimerDisplay() {
  document.getElementById('tnum').textContent = timerLeft;
  setTP(timerLeft / timerMax);
  document.getElementById('tp').style.stroke = timerLeft <= 10 ? '#e85d8a' : 'var(--acc)';
  document.getElementById('tlbl').textContent = timerLeft > 0 ? 'Counting down' : "Time's up!";
}

function setTP(f) {
  document.getElementById('tp').style.strokeDashoffset = CIRC * (1 - f);
}

// Auto-end turn when timer hits 0 (only if it's my turn and still playing)
async function autoEndTurn() {
  if (!lastState) return;
  if (lastState.gs.turn !== myTeamIdx) return;
  if (lastState.gs.phase !== 'playing') return;
  await fetch('/api/end-turn', { method: 'POST' });
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
</html>
