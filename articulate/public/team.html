<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Articulate! Team</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0e0d;--surf:#1c1a17;--surf2:#252220;--bdr:#3a3530;--txt:#f5f0e8;--muted:#9a9080;--acc:#e8a030}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh}
.screen{display:none;padding:20px;max-width:460px;margin:0 auto}
.screen.on{display:block}
.logo{font-family:'Fraunces',serif;font-size:24px;font-weight:900;color:var(--acc);text-align:center;margin-bottom:6px}
.sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:18px;margin-bottom:12px}
label{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.4px;display:block;margin-bottom:5px;text-transform:uppercase}
input,select{width:100%;background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;color:var(--txt);padding:10px 13px;font-family:'DM Sans',sans-serif;font-size:16px;outline:none;margin-bottom:12px}
input:focus,select:focus{border-color:var(--acc)}
select option{background:var(--surf)}
.btn{width:100%;padding:13px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;border:1px solid var(--bdr);background:none;color:var(--txt);transition:all .12s;margin-bottom:8px}
.btn:hover{background:var(--surf2)}
.btn-acc{background:var(--acc);color:#000;border-color:var(--acc)}
.btn-acc:hover{background:#f0b040}
.code-big{font-size:34px;font-family:'Fraunces',serif;font-weight:700;letter-spacing:8px;text-align:center;text-transform:uppercase;margin-bottom:12px}
.spin-wrap{text-align:center;padding:28px 0}
.spin{width:34px;height:34px;border:2.5px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-txt{font-size:14px;color:var(--muted)}
.turn-banner{border-radius:10px;padding:11px 15px;text-align:center;font-size:14px;font-weight:500;margin-bottom:12px}
.your-turn{background:#1a3d2a;color:#52c97a}
.their-turn{background:var(--surf2);color:var(--muted)}
.timer-ring{position:relative;width:110px;height:110px;margin:0 auto 8px}
.timer-ring svg{transform:rotate(-90deg)}
circle{fill:none;stroke-width:7}
.tr{stroke:var(--bdr)}
.tp{stroke:var(--acc);stroke-linecap:round;transition:stroke-dashoffset .9s linear,stroke .3s}
.tnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:32px;font-weight:700}
.tlbl{font-size:12px;color:var(--muted);text-align:center;margin-bottom:10px}
.card-reveal{border:1px solid var(--bdr);border-radius:12px;padding:26px;text-align:center;min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:10px 0}
.big-word{font-family:'Fraunces',serif;font-size:46px;font-weight:900;line-height:1.1}
.cat-chip{font-size:11px;padding:2px 10px;border-radius:20px;font-weight:500;margin-bottom:10px;display:inline-block}
.hint-txt{font-size:13px;color:var(--muted);margin-top:8px}
.hidden-card{color:var(--muted);font-size:14px}
.scores-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.score-box{background:var(--surf2);border-radius:10px;padding:11px 13px}
.score-box.me{border:1.5px solid var(--acc)}
.sname{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.spos{font-size:11px;color:var(--muted);margin-top:2px}
.sscr{font-family:'Fraunces',serif;font-size:24px;font-weight:700;color:var(--acc);margin-top:2px}
.prog{height:4px;background:var(--bdr);border-radius:2px;margin-top:6px;overflow:hidden}
.prog-f{height:100%;background:var(--acc);border-radius:2px;transition:width .4s}
.playing-dot{width:7px;height:7px;border-radius:50%;background:#52c97a;display:inline-block;margin-right:4px;vertical-align:middle}
.winner-box{background:#2a1f00;border:1px solid #6a4f00;border-radius:12px;padding:18px;text-align:center;margin-bottom:12px}
.winner-box h2{font-family:'Fraunces',serif;font-size:26px;color:var(--acc)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;padding:9px 18px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.conn-dot{width:8px;height:8px;border-radius:50%;background:#888;display:inline-block;margin-right:6px;vertical-align:middle;transition:background .3s}
.conn-dot.ok{background:#52c97a}
</style>
</head>
<body>

<div class="screen on" id="s-join">
  <div style="padding-top:40px">
    <div class="logo">Articulate!</div>
    <div class="sub">Team device</div>
    <div class="card">
      <label>Room code</label>
      <input class="code-big" id="room-in" maxlength="4" placeholder="ABCD" autocomplete="off"
        oninput="this.value=this.value.toUpperCase(); tryLoadTeams()"/>
      <label>Your team</label>
      <select id="team-sel"></select>
      <label>Your name (optional)</label>
      <input id="nickname" placeholder="e.g. Eric" style="margin-bottom:16px"/>
      <button class="btn btn-acc" onclick="joinGame()">Join game</button>
    </div>
  </div>
</div>

<div class="screen" id="s-waiting">
  <div class="card" style="margin-top:50px">
    <div class="spin-wrap">
      <div class="spin"></div>
      <div class="spin-txt">Joining room <strong id="w-code"></strong>...</div>
      <div class="spin-txt" style="margin-top:6px">Waiting for the host to start.</div>
    </div>
    <button class="btn" onclick="leaveGame()">Leave</button>
  </div>
</div>

<div class="screen" id="s-game">
  <div id="winner-area"></div>
  <div id="turn-banner" class="turn-banner their-turn">Waiting...</div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div>
        <div style="font-weight:500;font-size:15px" id="g-myteam">Your team</div>
        <div style="font-size:12px;color:var(--muted)"><span class="conn-dot" id="conn-dot"></span><span id="conn-lbl">Connecting...</span></div>
      </div>
      <button class="btn" style="width:auto;padding:6px 12px;font-size:12px;margin:0" onclick="leaveGame()">Leave</button>
    </div>

    <div class="timer-ring">
      <svg width="110" height="110" viewBox="0 0 110 110">
        <circle class="tr" cx="55" cy="55" r="48"/>
        <circle class="tp" id="tp" cx="55" cy="55" r="48" stroke-dasharray="301.6" stroke-dashoffset="0"/>
      </svg>
      <div class="tnum" id="tnum">—</div>
    </div>
    <div class="tlbl" id="tlbl">Waiting</div>

    <div id="card-reveal" class="card-reveal">
      <div class="hidden-card">Waiting for host to draw a card...</div>
    </div>
  </div>

  <div class="card">
    <div style="font-size:11px;font-weight:500;color:var(--muted);margin-bottom:10px;letter-spacing:.5px;text-transform:uppercase">Scoreboard</div>
    <div class="scores-grid" id="scores-grid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CIRC = 301.6;
const TCOLORS = ['#4a9eff','#e85d8a','#52c97a','#f5a623','#ff7f50','#b39ddb'];
const CATCOL = {Object:'#4a9eff',Action:'#e85d8a',World:'#52c97a',Person:'#f5a623',Nature:'#3cd08a',Random:'#c57aff'};

let myTeamIdx = -1;
let myRoom = '';
let lastState = null;
let es = null;
let timerI = null;
let timerLeft = 0;
let timerMax = 60;

function showScreen(s) {
  document.querySelectorAll('.screen').forEach(e => e.classList.remove('on'));
  document.getElementById('s-' + s).classList.add('on');
}

async function tryLoadTeams() {
  const code = document.getElementById('room-in').value.trim().toUpperCase();
  if (code.length !== 4) return;
  try {
    const r = await fetch('/api/state');
    const s = await r.json();
    if (s && s.teams) {
      const sel = document.getElementById('team-sel');
      sel.innerHTML = s.teams.map((t, i) => `<option value="${i}">${t.name}</option>`).join('');
    }
  } catch {}
}

async function joinGame() {
  const code = document.getElementById('room-in').value.trim().toUpperCase();
  if (code.length !== 4) { toast('Enter a 4-letter room code'); return; }
  try {
    const r = await fetch('/api/state');
    const s = await r.json();
    if (!s || !s.room) { toast('Room not found — is the host running?'); return; }
    if (s.room !== code) { toast('Wrong room code'); return; }
  } catch { toast('Cannot reach server'); return; }
  myRoom = code;
  myTeamIdx = parseInt(document.getElementById('team-sel').value);
  document.getElementById('w-code').textContent = code;
  showScreen('waiting');
  connectSSE();
}

function leaveGame() {
  if (es) { es.close(); es = null; }
  clearInterval(timerI);
  myRoom = ''; myTeamIdx = -1;
  document.getElementById('team-sel').innerHTML = '<option value="0">Team 1</option><option value="1">Team 2</option>';
  showScreen('join');
}

function connectSSE() {
  if (es) es.close();
  es = new EventSource('/events');
  es.onopen = () => setConn(true);
  es.onmessage = e => {
    setConn(true);
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'state') applyState(d.payload);
    } catch {}
  };
  es.onerror = () => {
    setConn(false);
    setTimeout(connectSSE, 3000);
  };
}

function setConn(ok) {
  const dot = document.getElementById('conn-dot');
  const lbl = document.getElementById('conn-lbl');
  if (!dot) return;
  dot.className = 'conn-dot' + (ok ? ' ok' : '');
  lbl.textContent = ok ? 'Connected' : 'Reconnecting...';
}

function applyState(s) {
  lastState = s;
  if (document.getElementById('s-waiting').classList.contains('on')) {
    showScreen('game');
    if (s.teams && s.teams[myTeamIdx]) {
      document.getElementById('g-myteam').textContent = s.teams[myTeamIdx].name;
    }
  }
  renderGame(s);
}

function renderGame(s) {
  if (!s) return;
  const { teams, settings, gs, currentCard } = s;
  const isMyTurn = gs.turn === myTeamIdx;
  timerMax = parseInt(settings.timer);

  // Winner
  const w = teams.findIndex(t => t.pos >= parseInt(settings.spaces));
  document.getElementById('winner-area').innerHTML = w >= 0
    ? `<div class="winner-box"><h2>🎉 ${teams[w].name} wins!</h2><p style="color:var(--muted);font-size:13px;margin-top:5px">First to ${settings.spaces} spaces!</p></div>`
    : '';

  // Turn banner
  const banner = document.getElementById('turn-banner');
  if (isMyTurn && currentCard) {
    banner.className = 'turn-banner your-turn';
    banner.textContent = 'Your turn — describe the card!';
  } else if (isMyTurn && gs.phase === 'idle') {
    banner.className = 'turn-banner your-turn';
    banner.textContent = 'Your turn — waiting for host to draw...';
  } else {
    banner.className = 'turn-banner their-turn';
    banner.innerHTML = `<span class="playing-dot"></span>${teams[gs.turn] ? teams[gs.turn].name : '?'} is describing...`;
  }

  // Card
  const cr = document.getElementById('card-reveal');
  if (isMyTurn && currentCard) {
    const col = CATCOL[currentCard.cat] || '#999';
    cr.innerHTML = `
      <div class="cat-chip" style="background:${col}22;color:${col}">${currentCard.cat}</div>
      <div class="big-word">${currentCard.word}</div>
      ${currentCard.hint ? `<div class="hint-txt">💡 ${currentCard.hint}</div>` : ''}
    `;
  } else if (isMyTurn) {
    cr.innerHTML = '<div class="hidden-card">Waiting for host to draw the next card...</div>';
  } else {
    cr.innerHTML = '<div class="hidden-card">Card hidden — only the describer sees it</div>';
  }

  // Timer
  if (gs.phase === 'playing') {
    const elapsed = Math.floor((Date.now() - s.timestamp) / 1000);
    timerLeft = Math.max(0, timerMax - elapsed);
    startTimer();
  } else {
    stopTimer();
    document.getElementById('tnum').textContent = timerMax;
    setTP(1);
    document.getElementById('tlbl').textContent = 'Ready';
  }

  // Scores
  document.getElementById('g-myteam').textContent = teams[myTeamIdx] ? teams[myTeamIdx].name : 'Your team';
  document.getElementById('scores-grid').innerHTML = teams.map((t, i) => {
    const pct = Math.round(Math.min(100, (t.pos / parseInt(settings.spaces)) * 100));
    return `<div class="score-box ${i === myTeamIdx ? 'me' : ''}">
      <div class="sname">${i === gs.turn ? '<span class="playing-dot"></span>' : ''}${t.name}</div>
      <div class="spos">${t.pos} / ${settings.spaces} spaces</div>
      <div class="sscr">${t.score}</div>
      <div class="prog"><div class="prog-f" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function startTimer() {
  stopTimer();
  renderTimerDisplay();
  timerI = setInterval(() => {
    timerLeft = Math.max(0, timerLeft - 1);
    renderTimerDisplay();
    if (timerLeft <= 0) stopTimer();
  }, 1000);
}

function stopTimer() { clearInterval(timerI); timerI = null; }

function renderTimerDisplay() {
  document.getElementById('tnum').textContent = timerLeft;
  setTP(timerLeft / timerMax);
  document.getElementById('tp').style.stroke = timerLeft <= 10 ? '#e85d8a' : 'var(--acc)';
  document.getElementById('tlbl').textContent = timerLeft > 0 ? 'Counting down' : "Time's up!";
}

function setTP(f) {
  document.getElementById('tp').style.strokeDashoffset = CIRC * (1 - f);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// Pre-populate team list
fetch('/api/state').then(r => r.json()).then(s => {
  if (s && s.teams) {
    document.getElementById('team-sel').innerHTML = s.teams.map((t, i) => `<option value="${i}">${t.name}</option>`).join('');
  }
}).catch(() => {});
</script>
</body>
</html>
